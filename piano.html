<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invisible Piano</title>
  <link rel="stylesheet" href="piano_style.css">
</head>
<body>

  <h2>Play the piano here!</h2>

  <div class="instrument" data-folder="sounds/piano">
    <img src="https://europianosnaples.com/wp-content/uploads/2018/02/piano-key-names.jpeg" alt="Piano">

    <button class="key" style="left:0%" data-note="1"></button>
    <button class="key" style="left:14.28%" data-note="2"></button>
    <button class="key" style="left:28.56%" data-note="3"></button>
    <button class="key" style="left:42.84%" data-note="4"></button>
    <button class="key" style="left:57.12%" data-note="5"></button>
    <button class="key" style="left:71.4%" data-note="6"></button>
    <button class="key" style="left:85.68%" data-note="7"></button>
  </div>

  <script src="instruments.js"></script>
</body>
</html>
