<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Fretboard</title>
  <link rel="stylesheet" href="guitar_style.css">
</head>
<body>

  <h2>Play the guitar here!</h2>

  <div class="instrument">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/37/Guitar_Fretboard_Open_Strings_Diagram.png" alt="Guitar Fretboard">

    <button class="string" style="top: 5%;"  data-sound="fret1.mp3"></button>
    <button class="string" style="top: 20%;" data-sound="fret2.mp3"></button>
    <button class="string" style="top: 35%;" data-sound="fret3.mp3"></button>
    <button class="string" style="top: 50%;" data-sound="fret4.mp3"></button>
    <button class="string" style="top: 65%;" data-sound="fret5.mp3"></button>
    <button class="string" style="top: 80%;" data-sound="fret6.mp3"></button>
</div>


  <script src="instruments.js"></script>

</body>
</html>
