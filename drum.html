<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drum Kit</title>
  <link rel="stylesheet" href="drum_style.css">
</head>
<body>

  <h2 id="display">Play the Drum Kit!</h2>

  <div class="container">

    <button data-sound="1-bass-drum.mp3">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPLgrpj9_clEoLmthz3q0G0EN2BWVQm_UdAqey7WI3A5amJaHLtW2O72Jiqe0tDXGDeLU&usqp=CAU" alt="Bass Drum">
      <p>Bass Drum</p>
    </button>

    <button data-sound="2-snare-drum.mp3">
      <img src="https://cdn.shopaccino.com/johns-music/products/dmp1255-mvm-923412_l.jpg?v=625" alt="Snare Drum">
      <p>Snare Drum</p>
    </button>

    <button data-sound="3-floor-tom.mp3">
      <img src="https://thumbs.static-thomann.de/thumb/padthumb600x600/pics/bdb/_51/510824/16778414_800.jpg" alt="Floor Tom">
      <p>Floor Tom</p>
    </button>

    <button data-sound="4-rack-toms.mp3">
      <img src="https://i.ebayimg.com/images/g/GCYAAeSw4rJon6dE/s-l300.jpg" alt="Rack Toms">
      <p>Rack Toms</p>
    </button>

    <button data-sound="5-crash-cymbal.mp3">
      <img src="https://cdn.shopify.com/s/files/1/0621/5027/9317/files/DECMCR16_ALT2_8ffd8b4d-4f65-40d7-a6e8-de4b87f15f06.jpg?v=1747695194" alt="Crash Cymbal">
      <p>Crash Cymbal</p>
    </button>

    <button data-sound="6-ride-cymbal.mp3">
      <img src="https://rockemmusic.com/wp-content/uploads/2024/07/ctjz1bayuy3.jpg" alt="Ride Cymbal">
      <p>Ride Cymbal</p>
    </button>

  </div>

  <script src="instruments.js"></script>
</body>
</html>
